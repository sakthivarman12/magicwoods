<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Magic Woods - Premium Designer Furniture</title>
    <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
    <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
    <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --color-primary: #2a5a3e;
            --color-primary-light: #4a7a5e;
            --color-accent: #5e3a2a;
            --color-accent-warm: #b8860b;
            --color-accent-blue: #1e3a5f;
            --color-bg-light: #f5f1eb;
            --color-bg-white: #ffffff;
            --color-text-dark: #1a1a1a;
            --color-text-light: #666666;
            --color-border: #e0dcd3;
            --color-success: #4a7a5e;
            --space-xs: 0.5rem;
            --space-sm: 1rem;
            --space-md: 1.5rem;
            --space-lg: 2rem;
            --space-xl: 3rem;
            --space-2xl: 4rem;
        }

        html, body {
            width: 100%;
            height: 100%;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', sans-serif;
            background-color: var(--color-bg-white);
            color: var(--color-text-dark);
            overflow-x: hidden;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 var(--space-md);
        }

        h1 {
            font-size: clamp(2rem, 5vw, 4rem);
            font-weight: 700;
            line-height: 1.2;
            margin-bottom: var(--space-md);
            color: var(--color-text-dark);
        }

        h2 {
            font-size: clamp(1.5rem, 4vw, 2.5rem);
            font-weight: 600;
            line-height: 1.3;
            margin-bottom: var(--space-lg);
            color: var(--color-text-dark);
        }

        h3 {
            font-size: 1.25rem;
            font-weight: 600;
            margin-bottom: var(--space-sm);
            color: var(--color-text-dark);
        }

        p {
            font-size: 1rem;
            line-height: 1.6;
            color: var(--color-text-light);
            margin-bottom: var(--space-md);
        }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: var(--space-sm);
            padding: var(--space-sm) var(--space-lg);
            border: none;
            border-radius: 0.25rem;
            font-size: 1rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
        }

        .btn-primary {
            background-color: var(--color-primary);
            color: white;
        }

        .btn-primary:hover {
            background-color: var(--color-primary-light);
            transform: translateY(-2px);
            box-shadow: 0 8px 16px rgba(42, 90, 62, 0.2);
        }

        .btn-secondary {
            background-color: transparent;
            color: var(--color-primary);
            border: 1.5px solid var(--color-primary);
        }

        .btn-secondary:hover {
            background-color: var(--color-primary);
            color: white;
        }

        .btn-sm {
            padding: 0.5rem 1rem;
            font-size: 0.875rem;
        }

        header {
            background-color: var(--color-bg-white);
            border-bottom: 1px solid var(--color-border);
            position: sticky;
            top: 0;
            z-index: 100;
            backdrop-filter: blur(10px);
            background-color: rgba(255, 255, 255, 0.95);
        }

        nav {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: var(--space-md) 0;
        }

        .nav-brand {
            font-size: 1.5rem;
            font-weight: 700;
            letter-spacing: -1px;
            color: var(--color-primary);
        }

        .nav-links {
            display: flex;
            gap: var(--space-xl);
            list-style: none;
        }

        .nav-links a {
            text-decoration: none;
            color: var(--color-text-dark);
            font-weight: 500;
            position: relative;
            transition: color 0.3s ease;
        }

        .nav-links a::after {
            content: '';
            position: absolute;
            bottom: -4px;
            left: 0;
            width: 0;
            height: 2px;
            background-color: var(--color-accent-warm);
            transition: width 0.3s ease;
        }

        .nav-links a:hover {
            color: var(--color-accent-warm);
        }

        .nav-links a:hover::after {
            width: 100%;
        }

        .nav-icons {
            display: flex;
            gap: var(--space-lg);
            align-items: center;
        }

        .icon-btn {
            background: none;
            border: none;
            cursor: pointer;
            font-size: 1.5rem;
            color: var(--color-text-dark);
            transition: color 0.3s ease;
            display: flex;
            align-items: center;
            position: relative;
        }

        .icon-btn:hover {
            color: var(--color-accent-warm);
        }

        .cart-badge {
            position: absolute;
            top: -8px;
            right: -8px;
            background-color: var(--color-accent-warm);
            color: white;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.75rem;
            font-weight: 700;
        }

        .user-badge {
            display: flex;
            align-items: center;
            gap: var(--space-sm);
            padding: var(--space-xs) var(--space-md);
            background-color: var(--color-bg-light);
            border-radius: 20px;
            font-size: 0.875rem;
            font-weight: 600;
        }

        .user-avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--color-primary), var(--color-accent-warm));
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 0.875rem;
            font-weight: 700;
        }

        .logout-btn {
            background: none;
            border: none;
            color: var(--color-text-light);
            cursor: pointer;
            font-size: 0.75rem;
            text-decoration: underline;
            transition: color 0.3s ease;
            padding: 0;
        }

        .logout-btn:hover {
            color: var(--color-primary);
        }

        /* Login Modal */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background-color: rgba(0, 0, 0, 0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 2000;
            backdrop-filter: blur(4px);
        }

        .modal-content {
            background: white;
            border-radius: 12px;
            padding: var(--space-2xl);
            width: 90%;
            max-width: 450px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.2);
            animation: slideUp 0.3s ease;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .modal-header {
            margin-bottom: var(--space-lg);
        }

        .modal-header h2 {
            margin-bottom: var(--space-sm);
        }

        .modal-header p {
            color: var(--color-text-light);
            font-size: 0.875rem;
        }

        .form-group {
            margin-bottom: var(--space-lg);
        }

        .form-group label {
            display: block;
            font-weight: 600;
            margin-bottom: var(--space-sm);
            color: var(--color-text-dark);
        }

        .form-group input {
            width: 100%;
            padding: var(--space-sm);
            border: 1px solid var(--color-border);
            border-radius: 0.25rem;
            font-size: 1rem;
            font-family: inherit;
            transition: border-color 0.3s ease;
        }

        .form-group input:focus {
            outline: none;
            border-color: var(--color-primary);
            box-shadow: 0 0 0 3px rgba(42, 90, 62, 0.1);
        }

        .role-selector {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: var(--space-md);
            margin-bottom: var(--space-lg);
        }

        .role-option {
            padding: var(--space-md);
            border: 2px solid var(--color-border);
            border-radius: 0.5rem;
            cursor: pointer;
            text-align: center;
            transition: all 0.3s ease;
            background: white;
        }

        .role-option:hover {
            border-color: var(--color-primary);
        }

        .role-option.selected {
            background-color: var(--color-primary);
            color: white;
            border-color: var(--color-primary);
        }

        .role-option-icon {
            font-size: 2rem;
            margin-bottom: var(--space-xs);
        }

        .role-option-label {
            font-weight: 600;
            font-size: 0.875rem;
        }

        .modal-buttons {
            display: flex;
            gap: var(--space-md);
        }

        .modal-buttons button {
            flex: 1;
            padding: var(--space-sm);
            border: none;
            border-radius: 0.25rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-submit {
            background-color: var(--color-primary);
            color: white;
        }

        .btn-submit:hover {
            background-color: var(--color-primary-light);
        }

        .btn-cancel {
            background-color: var(--color-bg-light);
            color: var(--color-text-dark);
        }

        .btn-cancel:hover {
            background-color: var(--color-border);
        }

        /* Admin Dashboard */
        .admin-dashboard {
            position: fixed;
            top: 0;
            right: 0;
            width: 420px;
            height: 100vh;
            background: white;
            box-shadow: -2px 0 20px rgba(0, 0, 0, 0.1);
            z-index: 1500;
            display: flex;
            flex-direction: column;
            animation: slideInRight 0.3s ease;
        }

        @media (max-width: 768px) {
            .admin-dashboard {
                width: 100%;
            }
        }

        @keyframes slideInRight {
            from {
                transform: translateX(100%);
            }
            to {
                transform: translateX(0);
            }
        }

        .admin-header {
            padding: var(--space-lg);
            border-bottom: 1px solid var(--color-border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .admin-header h3 {
            margin: 0;
        }

        .admin-close-btn {
            background: none;
            border: none;
            font-size: 1.5rem;
            cursor: pointer;
            color: var(--color-text-light);
            transition: color 0.3s ease;
        }

        .admin-close-btn:hover {
            color: var(--color-text-dark);
        }

        .admin-content {
            flex: 1;
            padding: var(--space-lg);
            overflow-y: auto;
        }

        .admin-section {
            margin-bottom: var(--space-xl);
            padding-bottom: var(--space-xl);
            border-bottom: 1px solid var(--color-border);
        }

        .admin-section h4 {
            margin-bottom: var(--space-md);
            color: var(--color-primary);
            font-size: 1rem;
        }

        .admin-input-group {
            margin-bottom: var(--space-md);
        }

        .admin-input-group label {
            display: block;
            font-size: 0.875rem;
            font-weight: 600;
            margin-bottom: var(--space-xs);
            color: var(--color-text-dark);
        }

        .admin-input-group input,
        .admin-input-group textarea {
            width: 100%;
            padding: var(--space-sm);
            border: 1px solid var(--color-border);
            border-radius: 0.25rem;
            font-family: inherit;
            font-size: 0.875rem;
        }

        .admin-input-group textarea {
            resize: vertical;
            min-height: 80px;
        }

        .admin-save-btn {
            background-color: var(--color-primary);
            color: white;
            padding: var(--space-sm) var(--space-lg);
            border: none;
            border-radius: 0.25rem;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            transition: all 0.3s ease;
        }

        .admin-save-btn:hover {
            background-color: var(--color-primary-light);
        }

        .hero {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: var(--space-2xl);
            align-items: center;
            padding: var(--space-2xl) 0;
            min-height: 70vh;
            position: relative;
            overflow: hidden;
        }

        .hero-content {
            z-index: 2;
        }

        .hero-content h1 {
            color: var(--color-primary);
            margin-bottom: var(--space-lg);
            animation: fadeInUp 0.8s ease;
        }

        .hero-content p {
            font-size: 1.125rem;
            margin-bottom: var(--space-xl);
            animation: fadeInUp 0.8s ease 0.1s backwards;
        }

        .hero-buttons {
            display: flex;
            gap: var(--space-md);
            animation: fadeInUp 0.8s ease 0.2s backwards;
        }

        .hero-image {
            position: relative;
            height: 100%;
            min-height: 500px;
            background: linear-gradient(135deg, var(--color-bg-light) 0%, rgba(42, 90, 62, 0.05) 100%);
            border-radius: 0.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            animation: fadeIn 1s ease 0.3s backwards;
        }

        .hero-image-placeholder {
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #e8dcc8 0%, #d4c4b0 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
            color: var(--color-primary);
            opacity: 0.3;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }

        .section {
            padding: var(--space-2xl) 0;
            border-top: 1px solid var(--color-border);
        }

        .section-header {
            text-align: center;
            margin-bottom: var(--space-2xl);
        }

        .section-header p {
            color: var(--color-accent-warm);
            font-weight: 600;
            text-transform: uppercase;
            font-size: 0.875rem;
            letter-spacing: 1px;
            margin-bottom: var(--space-md);
        }

        .collections-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: var(--space-lg);
            margin-bottom: var(--space-2xl);
        }

        .collection-card {
            position: relative;
            overflow: hidden;
            border-radius: 0.5rem;
            aspect-ratio: 3/4;
            cursor: pointer;
            transition: transform 0.3s ease;
        }

        .collection-card:hover {
            transform: translateY(-8px);
        }

        .collection-card-bg {
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #e8dcc8 0%, #d4c4b0 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 4rem;
            color: rgba(42, 90, 62, 0.2);
            position: relative;
        }

        .collection-overlay {
            position: absolute;
            inset: 0;
            background: linear-gradient(to top, rgba(0, 0, 0, 0.6) 0%, transparent 50%);
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            padding: var(--space-lg);
            color: white;
            transition: all 0.3s ease;
        }

        .collection-card:hover .collection-overlay {
            background: linear-gradient(to top, rgba(0, 0, 0, 0.8) 0%, transparent 40%);
        }

        .collection-name {
            font-size: 1.5rem;
            font-weight: 600;
            margin-bottom: var(--space-sm);
        }

        .collection-count {
            font-size: 0.875rem;
            opacity: 0.9;
        }

        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
            gap: var(--space-lg);
            margin-bottom: var(--space-2xl);
        }

        .product-card {
            position: relative;
            cursor: pointer;
            transition: transform 0.3s ease;
        }

        .product-card:hover {
            transform: translateY(-4px);
        }

        .product-image {
            width: 100%;
            aspect-ratio: 1;
            background: linear-gradient(135deg, #e8dcc8 0%, #d4c4b0 100%);
            border-radius: 0.25rem;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
            color: rgba(42, 90, 62, 0.2);
            margin-bottom: var(--space-md);
            position: relative;
            overflow: hidden;
        }

        .product-badge {
            position: absolute;
            top: var(--space-md);
            right: var(--space-md);
            background-color: var(--color-accent-warm);
            color: white;
            padding: var(--space-xs) var(--space-sm);
            border-radius: 0.25rem;
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            z-index: 10;
        }

        .product-info h3 {
            margin-bottom: var(--space-xs);
        }

        .product-description {
            font-size: 0.875rem;
            color: var(--color-text-light);
            margin-bottom: var(--space-sm);
        }

        .product-rating {
            display: flex;
            gap: var(--space-xs);
            margin-bottom: var(--space-md);
            font-size: 0.875rem;
        }

        .product-price {
            display: flex;
            gap: var(--space-sm);
            align-items: baseline;
            margin-bottom: var(--space-md);
        }

        .price-current {
            font-size: 1.25rem;
            font-weight: 600;
            color: var(--color-primary);
        }

        .price-original {
            font-size: 0.875rem;
            color: var(--color-text-light);
            text-decoration: line-through;
        }

        .filters {
            display: flex;
            gap: var(--space-sm);
            margin-bottom: var(--space-xl);
            flex-wrap: wrap;
        }

        .filter-btn {
            padding: var(--space-sm) var(--space-md);
            border: 1px solid var(--color-border);
            background: white;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.875rem;
            font-weight: 500;
            transition: all 0.3s ease;
            color: var(--color-text-light);
        }

        .filter-btn.active {
            background-color: var(--color-primary);
            color: white;
            border-color: var(--color-primary);
        }

        .filter-btn:hover {
            border-color: var(--color-primary);
            color: var(--color-primary);
        }

        .testimonials-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: var(--space-lg);
            margin-bottom: var(--space-2xl);
        }

        .testimonial-card {
            background-color: var(--color-bg-light);
            padding: var(--space-lg);
            border-radius: 0.5rem;
            position: relative;
        }

        .testimonial-header {
            display: flex;
            gap: var(--space-md);
            margin-bottom: var(--space-md);
        }

        .testimonial-avatar {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--color-primary), var(--color-accent-warm));
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 600;
            flex-shrink: 0;
        }

        .testimonial-meta h4 {
            margin: 0;
            font-size: 1rem;
        }

        .testimonial-meta p {
            margin: 0;
            font-size: 0.875rem;
            color: var(--color-text-light);
        }

        .testimonial-stars {
            color: var(--color-accent-warm);
            font-size: 0.875rem;
        }

        .testimonial-text {
            font-size: 0.95rem;
            line-height: 1.6;
            font-style: italic;
        }

        .cta-section {
            background: linear-gradient(135deg, var(--color-primary) 0%, var(--color-primary-light) 100%);
            color: white;
            padding: var(--space-2xl);
            border-radius: 0.5rem;
            text-align: center;
            margin-bottom: var(--space-2xl);
        }

        .cta-section h2 {
            color: white;
            margin-bottom: var(--space-lg);
        }

        .cta-section p {
            color: rgba(255, 255, 255, 0.9);
            margin-bottom: var(--space-lg);
        }

        .cta-section .btn {
            background-color: var(--color-accent-warm);
            color: var(--color-text-dark);
        }

        .cta-section .btn:hover {
            background-color: var(--color-accent-warm);
            opacity: 0.9;
        }

        footer {
            background-color: var(--color-text-dark);
            color: rgba(255, 255, 255, 0.8);
            padding: var(--space-2xl) 0;
            margin-top: var(--space-2xl);
            border-top: 1px solid var(--color-border);
        }

        .footer-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: var(--space-xl);
            margin-bottom: var(--space-xl);
        }

        .footer-section h4 {
            color: white;
            margin-bottom: var(--space-md);
            font-size: 1rem;
        }

        .footer-section ul {
            list-style: none;
        }

        .footer-section ul li {
            margin-bottom: var(--space-sm);
        }

        .footer-section a {
            color: rgba(255, 255, 255, 0.8);
            text-decoration: none;
            transition: color 0.3s ease;
            font-size: 0.875rem;
        }

        .footer-section a:hover {
            color: var(--color-accent-warm);
        }

        .footer-bottom {
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            padding-top: var(--space-lg);
            text-align: center;
            font-size: 0.875rem;
        }

        @media (max-width: 768px) {
            .hero {
                grid-template-columns: 1fr;
                padding: var(--space-xl) 0;
                min-height: auto;
            }

            .nav-links {
                gap: var(--space-lg);
            }

            .collections-grid,
            .products-grid {
                grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            }

            .hero-buttons {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <div id="app"></div>

    <script type="text/babel">
        const App = () => {
            const [isLoggedIn, setIsLoggedIn] = React.useState(false);
            const [userRole, setUserRole] = React.useState(null);
            const [userName, setUserName] = React.useState('');
            const [showLoginModal, setShowLoginModal] = React.useState(false);
            const [showAdminDash, setShowAdminDash] = React.useState(false);
            const [cartCount, setCartCount] = React.useState(2);
            const [email, setEmail] = React.useState('');
            const [password, setPassword] = React.useState('');
            const [selectedRole, setSelectedRole] = React.useState(null);
            
            // Admin editable content
            const [heroTitle, setHeroTitle] = React.useState('Curated Elegance for Modern Living');
            const [heroDesc, setHeroDesc] = React.useState('Discover handpicked designer furniture that transforms your space into a sanctuary of style and comfort. Premium craftsmanship meets contemporary design.');
            const [brandName, setBrandName] = React.useState('Magic Woods');

            const handleLogin = () => {
                if (!selectedRole || !email || !password) {
                    alert('Please fill all fields');
                    return;
                }
                setIsLoggedIn(true);
                setUserRole(selectedRole);
                setUserName(email.split('@')[0].toUpperCase());
                setShowLoginModal(false);
                setEmail('');
                setPassword('');
                setSelectedRole(null);

                if (selectedRole === 'admin') {
                    setShowAdminDash(true);
                }
            };

            const handleLogout = () => {
                setIsLoggedIn(false);
                setUserRole(null);
                setUserName('');
                setShowAdminDash(false);
            };

            const collections = [
                {name: 'Modern Seating', count: 24, icon: '🛋️'},
                {name: 'Dining Collections', count: 18, icon: '🪑'},
                {name: 'Bedroom Suites', count: 15, icon: '🛏️'},
                {name: 'Storage Solutions', count: 21, icon: '📦'},
                {name: 'Lighting Design', count: 12, icon: '💡'},
                {name: 'Outdoor Living', count: 9, icon: '🌿'},
            ];

            const products = [
                {name: 'Velvet Lounge Chair', price: '₹1,07,925', original: '₹1,33,125', badge: 'Sale', rating: 5},
                {name: 'Walnut Dining Table', price: '₹2,07,425', original: null, badge: 'New', rating: 4.5},
                {name: 'Modular Sofa', price: '₹2,74,425', original: '₹3,49,225', badge: 'Sale', rating: 5},
                {name: 'Minimalist Desk', price: '₹74,775', original: null, badge: null, rating: 4},
                {name: 'Statement Cabinet', price: '₹1,32,975', original: '₹1,66,175', badge: 'Sale', rating: 4.5},
                {name: 'Marble Side Table', price: '₹49,875', original: null, badge: null, rating: 5},
                {name: 'Upholstered Bench', price: '₹62,325', original: '₹79,025', badge: 'Sale', rating: 4},
                {name: 'Bookshelf System', price: '₹99,825', original: null, badge: 'New', rating: 4.5},
            ];

            const testimonials = [
                {name: 'Sarah Mitchell', role: 'Interior Designer', text: 'Exceptional quality and attention to detail. Magic Woods furniture elevated our entire project.', initials: 'SM'},
                {name: 'James Chen', role: 'Homeowner', text: 'The craftsmanship is incredible. Every piece arrived in perfect condition and looks even better than the photos.', initials: 'JC'},
                {name: 'Emma Rodriguez', role: 'Architect', text: 'We specify Magic Woods for all our residential projects. Clients consistently rave about the comfort and elegance.', initials: 'ER'},
            ];

            return (
                <div>
                    {/* Header */}
                    <header>
                        <div className="container">
                            <nav>
                                <div className="nav-brand">{brandName}</div>
                                <ul className="nav-links">
                                    <li><a href="#collections">Collections</a></li>
                                    <li><a href="#products">Products</a></li>
                                    <li><a href="#about">About</a></li>
                                    <li><a href="#contact">Contact</a></li>
                                </ul>
                                <div className="nav-icons">
                                    <button className="icon-btn">🔍</button>
                                    <button className="icon-btn">❤️</button>
                                    <button className="icon-btn" onClick={() => setCartCount(Math.max(0, cartCount - 1))}>
                                        🛒
                                        {cartCount > 0 && <span className="cart-badge">{cartCount}</span>}
                                    </button>
                                    {isLoggedIn ? (
                                        <div className="user-badge">
                                            <div className="user-avatar">{userName[0]}</div>
                                            <div style={{display: 'flex', flexDirection: 'column', gap: '2px'}}>
                                                <span>{userName} ({userRole})</span>
                                                <button className="logout-btn" onClick={handleLogout}>Logout</button>
                                            </div>
                                        </div>
                                    ) : (
                                        <button className="btn btn-sm btn-primary" onClick={() => setShowLoginModal(true)}>Login</button>
                                    )}
                                </div>
                            </nav>
                        </div>
                    </header>

                    {/* Hero Section */}
                    <section className="container">
                        <div className="hero">
                            <div className="hero-content">
                                <h1>{heroTitle}</h1>
                                <p>{heroDesc}</p>
                                <div className="hero-buttons">
                                    <button className="btn btn-primary">Shop Now</button>
                                    <button className="btn btn-secondary">Explore Collections</button>
                                </div>
                            </div>
                            <div className="hero-image">
                                <div className="hero-image-placeholder">🪴</div>
                            </div>
                        </div>
                    </section>

                    {/* Collections Section */}
                    <section className="section" id="collections">
                        <div className="container">
                            <div className="section-header">
                                <p>Featured Collections</p>
                                <h2>Explore Our Curated Selections</h2>
                            </div>
                            <div className="collections-grid">
                                {collections.map((col, idx) => (
                                    <div key={idx} className="collection-card">
                                        <div className="collection-card-bg">{col.icon}</div>
                                        <div className="collection-overlay">
                                            <div className="collection-name">{col.name}</div>
                                            <div className="collection-count">{col.count} Items</div>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </div>
                    </section>

                    {/* Products Section */}
                    <section className="section" id="products">
                        <div className="container">
                            <div className="section-header">
                                <p>Featured Items</p>
                                <h2>Handpicked Masterpieces</h2>
                            </div>

                            <div className="filters">
                                <button className="filter-btn active">All Products</button>
                                <button className="filter-btn">On Sale</button>
                                <button className="filter-btn">New Arrivals</button>
                                <button className="filter-btn">Best Sellers</button>
                                <button className="filter-btn">Customizable</button>
                            </div>

                            <div className="products-grid">
                                {products.map((prod, idx) => (
                                    <div key={idx} className="product-card">
                                        <div className="product-image">
                                            📦
                                            {prod.badge && <span className="product-badge">{prod.badge}</span>}
                                        </div>
                                        <div className="product-info">
                                            <h3>{prod.name}</h3>
                                            <p className="product-description">Premium quality • Sustainable materials</p>
                                            <div className="product-rating">
                                                {'⭐'.repeat(Math.floor(prod.rating))} ({prod.rating})
                                            </div>
                                            <div className="product-price">
                                                <span className="price-current">{prod.price}</span>
                                                {prod.original && <span className="price-original">{prod.original}</span>}
                                            </div>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </div>
                    </section>

                    {/* Testimonials Section */}
                    <section className="section">
                        <div className="container">
                            <div className="section-header">
                                <p>Customer Stories</p>
                                <h2>Loved by Designers & Homeowners</h2>
                            </div>
                            <div className="testimonials-grid">
                                {testimonials.map((test, idx) => (
                                    <div key={idx} className="testimonial-card">
                                        <div className="testimonial-header">
                                            <div className="testimonial-avatar">{test.initials}</div>
                                            <div className="testimonial-meta">
                                                <h4>{test.name}</h4>
                                                <p>{test.role}</p>
                                                <div className="testimonial-stars">⭐⭐⭐⭐⭐</div>
                                            </div>
                                        </div>
                                        <p className="testimonial-text">"{test.text}"</p>
                                    </div>
                                ))}
                            </div>
                        </div>
                    </section>

                    {/* CTA Section */}
                    <section className="container">
                        <div className="cta-section">
                            <h2>Ready to Transform Your Space?</h2>
                            <p>Schedule a consultation with our design experts today</p>
                            <button className="btn">Book a Consultation</button>
                        </div>
                    </section>

                    {/* Footer */}
                    <footer>
                        <div className="container">
                            <div className="footer-grid">
                                <div className="footer-section">
                                    <h4>About {brandName}</h4>
                                    <ul>
                                        <li><a href="#">Our Story</a></li>
                                        <li><a href="#">Sustainability</a></li>
                                        <li><a href="#">Craftsmanship</a></li>
                                        <li><a href="#">Press</a></li>
                                    </ul>
                                </div>
                                <div className="footer-section">
                                    <h4>Customer Service</h4>
                                    <ul>
                                        <li><a href="#">Shipping Info</a></li>
                                        <li><a href="#">Returns</a></li>
                                        <li><a href="#">Warranty</a></li>
                                        <li><a href="#">FAQs</a></li>
                                    </ul>
                                </div>
                                <div className="footer-section">
                                    <h4>Collections</h4>
                                    <ul>
                                        <li><a href="#">Living Room</a></li>
                                        <li><a href="#">Bedroom</a></li>
                                        <li><a href="#">Dining</a></li>
                                        <li><a href="#">Outdoor</a></li>
                                    </ul>
                                </div>
                                <div className="footer-section">
                                    <h4>Connect</h4>
                                    <ul>
                                        <li><a href="#">Instagram</a></li>
                                        <li><a href="#">Pinterest</a></li>
                                        <li><a href="#">Design Blog</a></li>
                                        <li><a href="#">Newsletter</a></li>
                                    </ul>
                                </div>
                            </div>
                            <div className="footer-bottom">
                                <p>&copy; 2026 {brandName}. All rights reserved. | Privacy Policy | Terms of Service</p>
                            </div>
                        </div>
                    </footer>

                    {/* Login Modal */}
                    {showLoginModal && (
                        <div className="modal-overlay" onClick={() => setShowLoginModal(false)}>
                            <div className="modal-content" onClick={(e) => e.stopPropagation()}>
                                <div className="modal-header">
                                    <h2>Welcome Back</h2>
                                    <p>Login as a customer or admin</p>
                                </div>

                                <div className="form-group">
                                    <label>Select Your Role</label>
                                    <div className="role-selector">
                                        <div
                                            className={`role-option ${selectedRole === 'customer' ? 'selected' : ''}`}
                                            onClick={() => setSelectedRole('customer')}
                                        >
                                            <div className="role-option-icon">👤</div>
                                            <div className="role-option-label">Customer</div>
                                        </div>
                                        <div
                                            className={`role-option ${selectedRole === 'admin' ? 'selected' : ''}`}
                                            onClick={() => setSelectedRole('admin')}
                                        >
                                            <div className="role-option-icon">⚙️</div>
                                            <div className="role-option-label">Admin</div>
                                        </div>
                                    </div>
                                </div>

                                <div className="form-group">
                                    <label>Email</label>
                                    <input
                                        type="email"
                                        value={email}
                                        onChange={(e) => setEmail(e.target.value)}
                                        placeholder="your@email.com"
                                    />
                                </div>

                                <div className="form-group">
                                    <label>Password</label>
                                    <input
                                        type="password"
                                        value={password}
                                        onChange={(e) => setPassword(e.target.value)}
                                        placeholder="••••••••"
                                    />
                                </div>

                                <div className="modal-buttons">
                                    <button className="btn-submit" onClick={handleLogin}>Login</button>
                                    <button className="btn-cancel" onClick={() => setShowLoginModal(false)}>Cancel</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* Admin Dashboard */}
                    {showAdminDash && (
                        <div className="admin-dashboard">
                            <div className="admin-header">
                                <h3>Admin Dashboard</h3>
                                <button className="admin-close-btn" onClick={() => setShowAdminDash(false)}>✕</button>
                            </div>
                            <div className="admin-content">
                                <div className="admin-section">
                                    <h4>Brand Settings</h4>
                                    <div className="admin-input-group">
                                        <label>Brand Name</label>
                                        <input
                                            type="text"
                                            value={brandName}
                                            onChange={(e) => setBrandName(e.target.value)}
                                            placeholder="Enter brand name"
                                        />
                                    </div>
                                </div>

                                <div className="admin-section">
                                    <h4>Hero Section</h4>
                                    <div className="admin-input-group">
                                        <label>Hero Title</label>
                                        <input
                                            type="text"
                                            value={heroTitle}
                                            onChange={(e) => setHeroTitle(e.target.value)}
                                            placeholder="Enter hero title"
                                        />
                                    </div>
                                    <div className="admin-input-group">
                                        <label>Hero Description</label>
                                        <textarea
                                            value={heroDesc}
                                            onChange={(e) => setHeroDesc(e.target.value)}
                                            placeholder="Enter hero description"
                                        />
                                    </div>
                                </div>

                                <div className="admin-section">
                                    <h4>Product Management</h4>
                                    <p style={{fontSize: '0.875rem', color: 'var(--color-text-light)'}}>
                                        🔔 Add, edit, or remove products from the catalog
                                    </p>
                                    <button className="admin-save-btn" style={{marginTop: 'var(--space-md)'}}>Manage Products</button>
                                </div>

                                <div className="admin-section">
                                    <h4>Orders & Analytics</h4>
                                    <p style={{fontSize: '0.875rem', color: 'var(--color-text-light)'}}>
                                        📊 View sales reports and customer orders
                                    </p>
                                    <button className="admin-save-btn" style={{marginTop: 'var(--space-md)'}}>View Analytics</button>
                                </div>

                                <button className="admin-save-btn" onClick={() => {
                                    alert('Settings saved successfully!');
                                }}>
                                    💾 Save All Changes
                                </button>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        ReactDOM.createRoot(document.getElementById('app')).render(<App />);
    </script>
</body>
</html>
