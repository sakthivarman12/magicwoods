<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Magic Woods - Premium Designer Furniture</title>
    <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
    <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
    <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            /* Base Colors */
            --color-primary: #2a5a3e;
            --color-primary-light: #4a7a5e;
            --color-accent: #5e3a2a;
            --color-accent-warm: #b8860b;
            --color-accent-blue: #1e3a5f;
            --color-bg-light: #f5f1eb;
            --color-bg-white: #ffffff;
            --color-text-dark: #1a1a1a;
            --color-text-light: #666666;
            --color-border: #e0dcd3;
            --color-success: #4a7a5e;
            
            /* Spacing */
            --space-xs: 0.5rem;
            --space-sm: 1rem;
            --space-md: 1.5rem;
            --space-lg: 2rem;
            --space-xl: 3rem;
            --space-2xl: 4rem;
        }

        html, body {
            width: 100%;
            height: 100%;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', sans-serif;
            background-color: var(--color-bg-white);
            color: var(--color-text-dark);
            overflow-x: hidden;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 var(--space-md);
        }

        /* Typography */
        h1 {
            font-size: clamp(2rem, 5vw, 4rem);
            font-weight: 700;
            line-height: 1.2;
            margin-bottom: var(--space-md);
            color: var(--color-text-dark);
        }

        h2 {
            font-size: clamp(1.5rem, 4vw, 2.5rem);
            font-weight: 600;
            line-height: 1.3;
            margin-bottom: var(--space-lg);
            color: var(--color-text-dark);
        }

        h3 {
            font-size: 1.25rem;
            font-weight: 600;
            margin-bottom: var(--space-sm);
            color: var(--color-text-dark);
        }

        p {
            font-size: 1rem;
            line-height: 1.6;
            color: var(--color-text-light);
            margin-bottom: var(--space-md);
        }

        /* Buttons */
        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: var(--space-sm);
            padding: var(--space-sm) var(--space-lg);
            border: none;
            border-radius: 0.25rem;
            font-size: 1rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
        }

        .btn-primary {
            background-color: var(--color-primary);
            color: white;
        }

        .btn-primary:hover {
            background-color: var(--color-primary-light);
            transform: translateY(-2px);
            box-shadow: 0 8px 16px rgba(42, 90, 62, 0.2);
        }

        .btn-secondary {
            background-color: transparent;
            color: var(--color-primary);
            border: 1.5px solid var(--color-primary);
        }

        .btn-secondary:hover {
            background-color: var(--color-primary);
            color: white;
        }

        .btn-sm {
            padding: 0.5rem 1rem;
            font-size: 0.875rem;
        }

        /* Header/Navigation */
        header {
            background-color: var(--color-bg-white);
            border-bottom: 1px solid var(--color-border);
            position: sticky;
            top: 0;
            z-index: 100;
            backdrop-filter: blur(10px);
            background-color: rgba(255, 255, 255, 0.95);
        }

        nav {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: var(--space-md) 0;
        }

        .nav-brand {
            font-size: 1.5rem;
            font-weight: 700;
            letter-spacing: -1px;
            color: var(--color-primary);
        }

        .nav-links {
            display: flex;
            gap: var(--space-xl);
            list-style: none;
        }

        .nav-links a {
            text-decoration: none;
            color: var(--color-text-dark);
            font-weight: 500;
            position: relative;
            transition: color 0.3s ease;
        }

        .nav-links a::after {
            content: '';
            position: absolute;
            bottom: -4px;
            left: 0;
            width: 0;
            height: 2px;
            background-color: var(--color-accent-warm);
            transition: width 0.3s ease;
        }

        .nav-links a:hover {
            color: var(--color-accent-warm);
        }

        .nav-links a:hover::after {
            width: 100%;
        }

        .nav-icons {
            display: flex;
            gap: var(--space-lg);
            align-items: center;
        }

        .icon-btn {
            background: none;
            border: none;
            cursor: pointer;
            font-size: 1.5rem;
            color: var(--color-text-dark);
            transition: color 0.3s ease;
            display: flex;
            align-items: center;
            position: relative;
        }

        .icon-btn:hover {
            color: var(--color-accent-warm);
        }

        .cart-badge {
            position: absolute;
            top: -8px;
            right: -8px;
            background-color: var(--color-accent-warm);
            color: white;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.75rem;
            font-weight: 700;
        }

        /* Hero Section */
        .hero {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: var(--space-2xl);
            align-items: center;
            padding: var(--space-2xl) 0;
            min-height: 70vh;
            position: relative;
            overflow: hidden;
        }

        .hero-content {
            z-index: 2;
        }

        .hero-content h1 {
            color: var(--color-primary);
            margin-bottom: var(--space-lg);
            animation: fadeInUp 0.8s ease;
        }

        .hero-content p {
            font-size: 1.125rem;
            margin-bottom: var(--space-xl);
            animation: fadeInUp 0.8s ease 0.1s backwards;
        }

        .hero-buttons {
            display: flex;
            gap: var(--space-md);
            animation: fadeInUp 0.8s ease 0.2s backwards;
        }

        .hero-image {
            position: relative;
            height: 100%;
            min-height: 500px;
            background: linear-gradient(135deg, var(--color-bg-light) 0%, rgba(42, 90, 62, 0.05) 100%);
            border-radius: 0.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            animation: fadeIn 1s ease 0.3s backwards;
        }

        .hero-image-placeholder {
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #e8dcc8 0%, #d4c4b0 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
            color: var(--color-primary);
            opacity: 0.3;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }

        /* Collections Section */
        .section {
            padding: var(--space-2xl) 0;
            border-top: 1px solid var(--color-border);
        }

        .section-header {
            text-align: center;
            margin-bottom: var(--space-2xl);
        }

        .section-header p {
            color: var(--color-accent-warm);
            font-weight: 600;
            text-transform: uppercase;
            font-size: 0.875rem;
            letter-spacing: 1px;
            margin-bottom: var(--space-md);
        }

        .collections-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: var(--space-lg);
            margin-bottom: var(--space-2xl);
        }

        .collection-card {
            position: relative;
            overflow: hidden;
            border-radius: 0.5rem;
            aspect-ratio: 3/4;
            cursor: pointer;
            group: "cards";
            transition: transform 0.3s ease;
        }

        .collection-card:hover {
            transform: translateY(-8px);
        }

        .collection-card-bg {
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #e8dcc8 0%, #d4c4b0 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 4rem;
            color: rgba(42, 90, 62, 0.2);
            position: relative;
        }

        .collection-overlay {
            position: absolute;
            inset: 0;
            background: linear-gradient(to top, rgba(0, 0, 0, 0.6) 0%, transparent 50%);
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            padding: var(--space-lg);
            color: white;
            transition: all 0.3s ease;
        }

        .collection-card:hover .collection-overlay {
            background: linear-gradient(to top, rgba(0, 0, 0, 0.8) 0%, transparent 40%);
        }

        .collection-name {
            font-size: 1.5rem;
            font-weight: 600;
            margin-bottom: var(--space-sm);
        }

        .collection-count {
            font-size: 0.875rem;
            opacity: 0.9;
        }

        /* Products Grid */
        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
            gap: var(--space-lg);
            margin-bottom: var(--space-2xl);
        }

        .product-card {
            position: relative;
            cursor: pointer;
            transition: transform 0.3s ease;
        }

        .product-card:hover {
            transform: translateY(-4px);
        }

        .product-image {
            width: 100%;
            aspect-ratio: 1;
            background: linear-gradient(135deg, #e8dcc8 0%, #d4c4b0 100%);
            border-radius: 0.25rem;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
            color: rgba(42, 90, 62, 0.2);
            margin-bottom: var(--space-md);
            position: relative;
            overflow: hidden;
        }

        .product-badge {
            position: absolute;
            top: var(--space-md);
            right: var(--space-md);
            background-color: var(--color-accent-warm);
            color: white;
            padding: var(--space-xs) var(--space-sm);
            border-radius: 0.25rem;
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            z-index: 10;
        }

        .product-info h3 {
            margin-bottom: var(--space-xs);
        }

        .product-description {
            font-size: 0.875rem;
            color: var(--color-text-light);
            margin-bottom: var(--space-sm);
        }

        .product-rating {
            display: flex;
            gap: var(--space-xs);
            margin-bottom: var(--space-md);
            font-size: 0.875rem;
        }

        .product-price {
            display: flex;
            gap: var(--space-sm);
            align-items: baseline;
            margin-bottom: var(--space-md);
        }

        .price-current {
            font-size: 1.25rem;
            font-weight: 600;
            color: var(--color-primary);
        }

        .price-original {
            font-size: 0.875rem;
            color: var(--color-text-light);
            text-decoration: line-through;
        }

        .product-actions {
            display: flex;
            gap: var(--space-sm);
        }

        .product-actions button {
            flex: 1;
            padding: var(--space-sm);
            border: 1px solid var(--color-border);
            background: white;
            border-radius: 0.25rem;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: 500;
        }

        .product-actions button:hover {
            border-color: var(--color-primary);
            color: var(--color-primary);
        }

        /* Filters Section */
        .filters {
            display: flex;
            gap: var(--space-sm);
            margin-bottom: var(--space-xl);
            flex-wrap: wrap;
        }

        .filter-btn {
            padding: var(--space-sm) var(--space-md);
            border: 1px solid var(--color-border);
            background: white;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.875rem;
            font-weight: 500;
            transition: all 0.3s ease;
            color: var(--color-text-light);
        }

        .filter-btn.active {
            background-color: var(--color-primary);
            color: white;
            border-color: var(--color-primary);
        }

        .filter-btn:hover {
            border-color: var(--color-primary);
            color: var(--color-primary);
        }

        /* Testimonials */
        .testimonials-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: var(--space-lg);
            margin-bottom: var(--space-2xl);
        }

        .testimonial-card {
            background-color: var(--color-bg-light);
            padding: var(--space-lg);
            border-radius: 0.5rem;
            position: relative;
        }

        .testimonial-header {
            display: flex;
            gap: var(--space-md);
            margin-bottom: var(--space-md);
        }

        .testimonial-avatar {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--color-primary), var(--color-accent-warm));
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 600;
            flex-shrink: 0;
        }

        .testimonial-meta h4 {
            margin: 0;
            font-size: 1rem;
        }

        .testimonial-meta p {
            margin: 0;
            font-size: 0.875rem;
            color: var(--color-text-light);
        }

        .testimonial-stars {
            color: var(--color-accent-warm);
            font-size: 0.875rem;
        }

        .testimonial-text {
            font-size: 0.95rem;
            line-height: 1.6;
            font-style: italic;
        }

        /* CTA Section */
        .cta-section {
            background: linear-gradient(135deg, var(--color-primary) 0%, var(--color-primary-light) 100%);
            color: white;
            padding: var(--space-2xl);
            border-radius: 0.5rem;
            text-align: center;
            margin-bottom: var(--space-2xl);
        }

        .cta-section h2 {
            color: white;
            margin-bottom: var(--space-lg);
        }

        .cta-section p {
            color: rgba(255, 255, 255, 0.9);
            margin-bottom: var(--space-lg);
        }

        .cta-section .btn {
            background-color: var(--color-accent-warm);
            color: var(--color-text-dark);
        }

        .cta-section .btn:hover {
            background-color: var(--color-accent-warm);
            opacity: 0.9;
        }

        /* Footer */
        footer {
            background-color: var(--color-text-dark);
            color: rgba(255, 255, 255, 0.8);
            padding: var(--space-2xl) 0;
            margin-top: var(--space-2xl);
            border-top: 1px solid var(--color-border);
        }

        .footer-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: var(--space-xl);
            margin-bottom: var(--space-xl);
        }

        .footer-section h4 {
            color: white;
            margin-bottom: var(--space-md);
            font-size: 1rem;
        }

        .footer-section ul {
            list-style: none;
        }

        .footer-section ul li {
            margin-bottom: var(--space-sm);
        }

        .footer-section a {
            color: rgba(255, 255, 255, 0.8);
            text-decoration: none;
            transition: color 0.3s ease;
            font-size: 0.875rem;
        }

        .footer-section a:hover {
            color: var(--color-accent-warm);
        }

        .footer-bottom {
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            padding-top: var(--space-lg);
            text-align: center;
            font-size: 0.875rem;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .hero {
                grid-template-columns: 1fr;
                padding: var(--space-xl) 0;
                min-height: auto;
            }

            .nav-links {
                gap: var(--space-lg);
            }

            .collections-grid,
            .products-grid {
                grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            }

            .hero-buttons {
                flex-direction: column;
            }
        }

        /* Tweaks Panel */
        #tweaks-panel {
            position: fixed;
            bottom: 20px;
            right: 20px;
            width: 320px;
            background: white;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.15);
            z-index: 1000;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            display: none;
            flex-direction: column;
        }

        #tweaks-panel.active {
            display: flex;
        }

        .tweaks-header {
            padding: var(--space-md);
            border-bottom: 1px solid var(--color-border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-weight: 600;
            color: var(--color-text-dark);
        }

        .tweaks-close {
            background: none;
            border: none;
            cursor: pointer;
            font-size: 1.5rem;
            color: var(--color-text-light);
            transition: color 0.3s ease;
        }

        .tweaks-close:hover {
            color: var(--color-text-dark);
        }

        .tweaks-content {
            padding: var(--space-md);
            overflow-y: auto;
            max-height: 500px;
        }

        .tweak-group {
            margin-bottom: var(--space-lg);
        }

        .tweak-label {
            display: block;
            font-size: 0.875rem;
            font-weight: 600;
            color: var(--color-text-dark);
            margin-bottom: var(--space-sm);
        }

        .tweak-input {
            width: 100%;
            padding: var(--space-sm);
            border: 1px solid var(--color-border);
            border-radius: 0.25rem;
            font-size: 0.875rem;
            font-family: inherit;
        }

        .color-swatches {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: var(--space-sm);
        }

        .color-swatch {
            aspect-ratio: 1;
            border-radius: 0.25rem;
            cursor: pointer;
            border: 2px solid transparent;
            transition: all 0.3s ease;
        }

        .color-swatch:hover {
            transform: scale(1.05);
        }

        .color-swatch.active {
            border-color: var(--color-text-dark);
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
        }

        .layout-options {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: var(--space-sm);
        }

        .layout-option {
            padding: var(--space-sm);
            border: 1px solid var(--color-border);
            border-radius: 0.25rem;
            cursor: pointer;
            text-align: center;
            font-size: 0.75rem;
            transition: all 0.3s ease;
        }

        .layout-option:hover {
            border-color: var(--color-primary);
            color: var(--color-primary);
        }

        .layout-option.active {
            background-color: var(--color-primary);
            color: white;
            border-color: var(--color-primary);
        }

        /* Login Modal */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background-color: rgba(0, 0, 0, 0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 2000;
            backdrop-filter: blur(4px);
        }

        .modal-content {
            background: white;
            border-radius: 12px;
            padding: var(--space-2xl);
            width: 90%;
            max-width: 400px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.2);
            animation: slideUp 0.3s ease;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .modal-header {
            margin-bottom: var(--space-lg);
        }

        .modal-header h2 {
            margin-bottom: var(--space-sm);
        }

        .modal-header p {
            color: var(--color-text-light);
            font-size: 0.875rem;
        }

        .form-group {
            margin-bottom: var(--space-lg);
        }

        .form-group label {
            display: block;
            font-weight: 600;
            margin-bottom: var(--space-sm);
            color: var(--color-text-dark);
        }

        .form-group input {
            width: 100%;
            padding: var(--space-sm);
            border: 1px solid var(--color-border);
            border-radius: 0.25rem;
            font-size: 1rem;
            font-family: inherit;
            transition: border-color 0.3s ease;
        }

        .form-group input:focus {
            outline: none;
            border-color: var(--color-primary);
            box-shadow: 0 0 0 3px rgba(42, 90, 62, 0.1);
        }

        .role-selector {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: var(--space-md);
            margin-bottom: var(--space-lg);
        }

        .role-option {
            padding: var(--space-md);
            border: 2px solid var(--color-border);
            border-radius: 0.5rem;
            cursor: pointer;
            text-align: center;
            transition: all 0.3s ease;
            background: white;
        }

        .role-option:hover {
            border-color: var(--color-primary);
        }

        .role-option.selected {
            background-color: var(--color-primary);
            color: white;
            border-color: var(--color-primary);
        }

        .role-option-icon {
            font-size: 2rem;
            margin-bottom: var(--space-xs);
        }

        .role-option-label {
            font-weight: 600;
            font-size: 0.875rem;
        }

        .modal-buttons {
            display: flex;
            gap: var(--space-md);
        }

        .modal-buttons button {
            flex: 1;
            padding: var(--space-sm);
            border: none;
            border-radius: 0.25rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-submit {
            background-color: var(--color-primary);
            color: white;
        }

        .btn-submit:hover {
            background-color: var(--color-primary-light);
        }

        .btn-cancel {
            background-color: var(--color-bg-light);
            color: var(--color-text-dark);
        }

        .btn-cancel:hover {
            background-color: var(--color-border);
        }

        /* Admin Dashboard */
