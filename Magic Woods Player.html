<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Magic Woods</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #1a472a 0%, #2d5a3d 50%, #1a472a 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            overflow: hidden;
        }

        /* Animated background elements */
        .background-orbs {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: -1;
        }

        .orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.3;
            animation: float 20s ease-in-out infinite;
        }

        .orb-1 {
            width: 300px;
            height: 300px;
            background: #4ade80;
            top: -100px;
            left: -100px;
            animation-delay: 0s;
        }

        .orb-2 {
            width: 200px;
            height: 200px;
            background: #60a5fa;
            top: 50%;
            right: -50px;
            animation-delay: 5s;
        }

        .orb-3 {
            width: 250px;
            height: 250px;
            background: #a78bfa;
            bottom: -80px;
            left: 20%;
            animation-delay: 10s;
        }

        @keyframes float {
            0%, 100% {
                transform: translate(0, 0);
            }
            50% {
                transform: translate(30px, -30px);
            }
        }

        .container {
            max-width: 500px;
            width: 100%;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 24px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(10px);
            animation: slideUp 0.6s ease-out;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .title {
            font-size: 32px;
            font-weight: 700;
            color: #1a472a;
            margin-bottom: 8px;
            letter-spacing: -0.5px;
        }

        .subtitle {
            font-size: 14px;
            color: #666;
            font-weight: 500;
        }

        .player-wrapper {
            margin-bottom: 30px;
        }

        .album-art {
            width: 100%;
            aspect-ratio: 1;
            border-radius: 16px;
            background: linear-gradient(135deg, #4ade80 0%, #2d5a3d 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 24px;
            box-shadow: 0 10px 30px rgba(74, 222, 128, 0.2);
            overflow: hidden;
            position: relative;
        }

        .album-art svg {
            width: 60%;
            height: 60%;
            opacity: 0.8;
        }

        .album-art::before {
            content: '';
            position: absolute;
            inset: 0;
            background: radial-gradient(circle at 30% 30%, rgba(255, 255, 255, 0.1), transparent);
            pointer-events: none;
        }

        .playback-info {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 12px;
            color: #999;
            margin-bottom: 8px;
            font-variant-numeric: tabular-nums;
        }

        .progress-bar {
            width: 100%;
            height: 6px;
            background: #e5e7eb;
            border-radius: 3px;
            cursor: pointer;
            overflow: hidden;
            margin-bottom: 24px;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #4ade80, #22c55e);
            width: 0%;
            transition: width 0.1s linear;
            border-radius: 3px;
        }

        .controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 16px;
            margin-bottom: 24px;
        }

        button {
            border: none;
            background: none;
            cursor: pointer;
            padding: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.2s ease, opacity 0.2s ease;
            color: #1a472a;
        }

        button:hover {
            transform: scale(1.1);
        }

        button:active {
            transform: scale(0.95);
        }

        .btn-skip {
            width: 40px;
            height: 40px;
            opacity: 0.7;
        }

        .btn-skip:hover {
            opacity: 1;
        }

        .btn-play {
            width: 64px;
            height: 64px;
            background: linear-gradient(135deg, #4ade80, #22c55e);
            border-radius: 50%;
            box-shadow: 0 8px 24px rgba(74, 222, 128, 0.3);
            color: white;
        }

        .btn-play:hover {
            box-shadow: 0 12px 32px rgba(74, 222, 128, 0.4);
        }

        .btn-play svg {
            width: 28px;
            height: 28px;
            margin-left: 2px;
        }

        .volume-control {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .volume-slider {
            width: 100px;
            height: 4px;
            background: #e5e7eb;
            border-radius: 2px;
            cursor: pointer;
            overflow: hidden;
        }

        .volume-fill {
            height: 100%;
            background: linear-gradient(90deg, #4ade80, #22c55e);
            border-radius: 2px;
        }

        .volume-icon {
            width: 20px;
            height: 20px;
            color: #999;
            flex-shrink: 0;
        }

        audio {
            width: 0;
            height: 0;
        }

        .time-label {
            font-size: 11px;
            font-weight: 500;
            color: #666;
        }
    </style>
</head>
<body>
    <div class="background-orbs">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
        <div class="orb orb-3"></div>
    </div>

    <div class="container">
        <div class="header">
            <h1 class="title">🌲 Magic Woods</h1>
            <p class="subtitle">Audio Experience</p>
        </div>

        <div class="player-wrapper">
            <div class="album-art">
                <svg viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <circle cx="50" cy="50" r="45" stroke="white" stroke-width="2" opacity="0.3"/>
                    <path d="M30 50 Q35 35 50 35 Q65 35 70 50 Q65 65 50 65 Q35 65 30 50" fill="white" opacity="0.6"/>
                    <path d="M45 55 L55 45 L55 65 Z" fill="white" opacity="0.8"/>
                </svg>
            </div>

            <div class="playback-info">
                <span class="current-time">0:00</span>
                <span class="duration">0:00</span>
            </div>

            <div class="progress-bar">
                <div class="progress-fill"></div>
            </div>

            <div class="controls">
                <button class="btn-skip" title="Skip backward 10s">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M7 7v10a5 5 0 0 0 5 5h5M7 7H3v4m14-4v10a3 3 0 0 1-3 3h-4"/>
                    </svg>
                </button>

                <button class="btn-play" title="Play/Pause">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor" class="play-icon">
                        <path d="M8 5v14l11-7z"/>
                    </svg>
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor" class="pause-icon" style="display: none;">
                        <path d="M6 4h4v16H6V4zm8 0h4v16h-4V4z"/>
                    </svg>
                </button>

                <button class="btn-skip" title="Skip forward 10s">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M17 7v10a5 5 0 0 1-5 5H7m10-15h4v4m-14-4v10a3 3 0 0 0 3 3h4"/>
                    </svg>
                </button>
            </div>

            <div class="volume-control">
                <svg class="volume-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon>
                </svg>
                <div class="volume-slider">
                    <div class="volume-fill" style="width: 70%"></div>
                </div>
            </div>
        </div>
    </div>

    <audio id="audioPlayer" src="uploads/Wednesday-10h22m-pm.mp3"></audio>

    <script>
        const audio = document.getElementById('audioPlayer');
        const playBtn = document.querySelector('.btn-play');
        const progressBar = document.querySelector('.progress-bar');
        const progressFill = document.querySelector('.progress-fill');
        const currentTimeEl = document.querySelector('.current-time');
        const durationEl = document.querySelector('.duration');
        const playIcon = document.querySelector('.play-icon');
        const pauseIcon = document.querySelector('.pause-icon');
        const volumeSlider = document.querySelector('.volume-slider');
        const volumeFill = document.querySelector('.volume-fill');
        const skipBackBtn = document.querySelectorAll('.btn-skip')[0];
        const skipForwardBtn = document.querySelectorAll('.btn-skip')[1];

        // Restore saved volume
        const savedVolume = localStorage.getItem('audioVolume') || 0.7;
        audio.volume = savedVolume;
        updateVolumeFill();

        // Restore saved playback position
        const savedTime = localStorage.getItem('audioTime') || 0;
        audio.currentTime = savedTime;

        // Format time
        function formatTime(seconds) {
            if (!isFinite(seconds)) return '0:00';
            const mins = Math.floor(seconds / 60);
            const secs = Math.floor(seconds % 60);
            return `${mins}:${secs.toString().padStart(2, '0')}`;
        }

        // Update duration when metadata loads
        audio.addEventListener('loadedmetadata', () => {
            durationEl.textContent = formatTime(audio.duration);
        });

        // Play/Pause
        playBtn.addEventListener('click', () => {
            if (audio.paused) {
                audio.play();
            } else {
                audio.pause();
            }
        });

        audio.addEventListener('play', () => {
            playIcon.style.display = 'none';
            pauseIcon.style.display = 'block';
        });

        audio.addEventListener('pause', () => {
            playIcon.style.display = 'block';
            pauseIcon.style.display = 'none';
        });

        // Update progress
        audio.addEventListener('timeupdate', () => {
            const percent = (audio.currentTime / audio.duration) * 100;
            progressFill.style.width = percent + '%';
            currentTimeEl.textContent = formatTime(audio.currentTime);
            localStorage.setItem('audioTime', audio.currentTime);
        });

        // Seek
        progressBar.addEventListener('click', (e) => {
            const rect = progressBar.getBoundingClientRect();
            const percent = (e.clientX - rect.left) / rect.width;
            audio.currentTime = percent * audio.duration;
        });

        // Skip buttons
        skipBackBtn.addEventListener('click', () => {
            audio.currentTime = Math.max(0, audio.currentTime - 10);
        });

        skipForwardBtn.addEventListener('click', () => {
            audio.currentTime = Math.min(audio.duration, audio.currentTime + 10);
        });

        // Volume control
        volumeSlider.addEventListener('click', (e) => {
            const rect = volumeSlider.getBoundingClientRect();
            const percent = (e.clientX - rect.left) / rect.width;
            audio.volume = Math.max(0, Math.min(1, percent));
            localStorage.setItem('audioVolume', audio.volume);
            updateVolumeFill();
        });

        function updateVolumeFill() {
            volumeFill.style.width = (audio.volume * 100) + '%';
        }

        // Keyboard shortcuts
        document.addEventListener('keydown', (e) => {
            if (e.code === 'Space') {
                e.preventDefault();
                playBtn.click();
            }
            if (e.code === 'ArrowRight') {
                skipForwardBtn.click();
            }
            if (e.code === 'ArrowLeft') {
                skipBackBtn.click();
            }
        });
    </script>
</body>
</html>
