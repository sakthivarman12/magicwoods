<html lang="en">
<head>
  <meta charset="UTF-8" />

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>

  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --primary:       #1a3a2e;
      --primary-light: #2d5a4a;
      --accent:        #c9a961;
      --bg-light:      #f8f6f1;
      --bg-white:      #ffffff;
      --text-dark:     #1a1a1a;
      --text-light:    #666666;
      --border:        #e0dcd3;
      --sp-xs: 0.5rem;
      --sp-sm: 1rem;
      --sp-md: 1.5rem;
      --sp-lg: 2rem;
      --sp-xl: 3rem;
    }

    html, body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: var(--bg-white);
      color: var(--text-dark);
      scroll-behavior: smooth;
    }

    .container { max-width: 1400px; margin: 0 auto; padding: 0 var(--sp-md); }

    h1 { font-size: clamp(1.8rem, 4vw, 2.5rem); font-weight: 700; line-height: 1.2; }
    h2 { font-size: clamp(1.5rem, 3vw, 2rem); font-weight: 600; margin-bottom: var(--sp-lg); }
    h3 { font-size: 1.15rem; font-weight: 600; margin-bottom: var(--sp-xs); }
    p  { font-size: 1rem; line-height: 1.6; color: var(--text-light); }

    /* ── Buttons ── */
    .btn {
      display: inline-flex; align-items: center; justify-content: center;
      padding: 0.75rem var(--sp-lg);
      border: none; border-radius: 4px;
      font-weight: 600; font-size: 0.95rem; font-family: inherit;
      cursor: pointer; transition: all 0.25s ease; text-decoration: none;
    }
    .btn-primary {
      background: var(--primary); color: #fff;
    }
    .btn-primary:hover {
      background: var(--primary-light);
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(26,58,46,0.22);
    }
    .btn-outline {
      background: transparent; color: var(--primary);
      border: 2px solid var(--primary);
    }
    .btn-outline:hover {
      background: var(--primary); color: #fff;
    }
    .btn-accent { background: var(--accent); color: #fff; }
    .btn-accent:hover { background: #b8953d; transform: translateY(-1px); }

    /* ── Header ── */
    header {
      background: var(--bg-white);
      border-bottom: 1px solid var(--border);
      position: sticky; top: 0; z-index: 200;
    }
    nav {
      display: flex; align-items: center; justify-content: space-between;
      padding: var(--sp-md) 0; gap: var(--sp-md);
    }
    .nav-brand {
      font-size: 1.5rem; font-weight: 800;
      color: var(--primary); letter-spacing: -0.5px; white-space: nowrap;
    }
    .nav-links {
      display: flex; gap: var(--sp-xl); list-style: none;
    }
    .nav-links a {
      text-decoration: none; color: var(--text-dark);
      font-weight: 500; font-size: 0.95rem;
      transition: color 0.2s;
    }
    .nav-links a:hover { color: var(--accent); }
    .nav-icons { display: flex; gap: var(--sp-md); align-items: center; }
    .icon-btn {
      background: none; border: none; cursor: pointer;
      font-size: 1.4rem; position: relative;
      transition: transform 0.2s;
    }
    .icon-btn:hover { transform: scale(1.1); }
    .icon-btn.heart-active { animation: heartPop 0.55s ease-in-out; }
    @keyframes heartPop {
      0%  { transform: scale(1); }
      30% { transform: scale(1.35) rotate(-8deg); }
      60% { transform: scale(1.25) rotate(6deg); }
      100%{ transform: scale(1); }
    }
    .cart-badge {
      position: absolute; top: -8px; right: -8px;
      background: var(--accent); color: #fff;
      border-radius: 50%; width: 20px; height: 20px;
      display: flex; align-items: center; justify-content: center;
      font-size: 0.7rem; font-weight: 700;
    }

    /* ── Hero ── */
    .hero {
      display: grid; grid-template-columns: 1fr 1fr;
      gap: var(--sp-xl); align-items: center;
      padding: var(--sp-xl) 0; min-height: 560px;
    }
    .hero-content h1 { color: var(--primary); margin-bottom: var(--sp-md); }
    .hero-content p  { font-size: 1.05rem; margin-bottom: var(--sp-lg); }
    .hero-buttons    { display: flex; gap: var(--sp-md); flex-wrap: wrap; }
    .hero-image {
      background: linear-gradient(135deg, #e8dcc8 0%, #d4c4b0 100%);
      border-radius: 10px; height: 480px;
      display: flex; align-items: center; justify-content: center;
      font-size: 7rem; color: rgba(26,58,46,0.15);
      box-shadow: inset 0 2px 20px rgba(0,0,0,0.06);
    }

    /* ── Section ── */
    .section { padding: var(--sp-xl) 0; border-top: 1px solid var(--border); }
    .section-header { text-align: center; margin-bottom: var(--sp-xl); }
    .section-header .eyebrow {
      color: var(--accent); font-weight: 700;
      text-transform: uppercase; font-size: 0.8rem;
      letter-spacing: 2.5px; margin-bottom: var(--sp-sm); display: block;
    }
    .section-header h2 { margin-bottom: 0; }

    /* ── Filters ── */
    .filters { display: flex; gap: var(--sp-xs); flex-wrap: wrap; margin-bottom: var(--sp-xl); }
    .filter-btn {
      padding: 0.5rem var(--sp-md); border: 1px solid var(--border);
      background: #fff; border-radius: 25px; cursor: pointer;
      font-size: 0.875rem; font-weight: 500; font-family: inherit;
      transition: all 0.25s;
    }
    .filter-btn:hover { border-color: var(--primary-light); color: var(--primary); }
    .filter-btn.active {
      background: var(--primary); color: #fff; border-color: var(--primary);
    }

    /* ── Products Grid ── */
    .products-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(255px, 1fr));
      gap: var(--sp-lg);
    }
    .product-card {
      border: 1px solid var(--border); border-radius: 10px;
      padding: var(--sp-md); background: #fff;
      cursor: pointer; transition: all 0.28s ease;
    }
    .product-card:hover {
      transform: translateY(-7px);
      box-shadow: 0 14px 36px rgba(0,0,0,0.11);
      border-color: transparent;
    }
    .product-image {
      width: 100%; aspect-ratio: 1;
      background: linear-gradient(135deg, #e8dcc8 0%, #d4c4b0 100%);
      border-radius: 6px; margin-bottom: var(--sp-md);
      display: flex; align-items: center; justify-content: center;
      font-size: 3rem; position: relative; overflow: hidden;
    }
    .product-badge {
      position: absolute; top: 12px; right: 12px;
      background: var(--accent); color: #fff;
      padding: 3px 10px; border-radius: 4px;
      font-size: 0.7rem; font-weight: 700; text-transform: uppercase;
    }
    .product-name { font-weight: 600; font-size: 0.95rem; margin-bottom: var(--sp-xs); color: var(--text-dark); }
    .product-spec { font-size: 0.78rem; color: var(--text-light); line-height: 1.5; margin-bottom: var(--sp-xs); }
    .warranty-badge {
      display: inline-block; background: rgba(26,58,46,0.09);
      padding: 3px 8px; border-radius: 4px;
      font-size: 0.72rem; color: var(--primary); font-weight: 700;
      margin-bottom: var(--sp-xs);
    }
    .rating { font-size: 0.85rem; color: var(--accent); margin-bottom: var(--sp-sm); }
    .product-price { display: flex; gap: var(--sp-sm); align-items: baseline; margin-bottom: var(--sp-md); }
    .price-current { font-size: 1.4rem; font-weight: 700; color: var(--primary); }
    .price-original { font-size: 0.85rem; color: var(--text-light); text-decoration: line-through; }
    .product-actions { display: flex; gap: var(--sp-xs); }
    .product-actions button {
      flex: 1; padding: 0.55rem; border: 1px solid var(--border);
      background: #fff; border-radius: 5px; cursor: pointer;
      font-weight: 600; font-size: 0.82rem; font-family: inherit;
      transition: all 0.2s;
    }
    .product-actions button:hover { border-color: var(--primary); color: var(--primary); }

    /* ── Modal backdrop ── */
    .modal-backdrop {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.78);
      display: flex; align-items: center; justify-content: center;
      z-index: 1000; padding: var(--sp-md); overflow-y: auto;
    }
    .modal {
      background: #fff; border-radius: 14px;
      max-width: 1000px; width: 100%; padding: 2.5rem;
      position: relative; max-height: 92vh; overflow-y: auto;
      margin: auto;
    }
    .modal-close {
      position: absolute; top: 16px; right: 20px;
      background: none; border: none; font-size: 1.6rem;
      cursor: pointer; color: var(--text-light); line-height: 1;
      transition: color 0.2s;
    }
    .modal-close:hover { color: var(--text-dark); }
    .modal-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 2.5rem; margin-top: 1rem; }
    .modal-viewer { height: 380px; border-radius: 10px; overflow: hidden; border: 1px solid var(--border); }
    .modal-info h2 { font-size: 1.5rem; margin-bottom: var(--sp-md); }
    .modal-price { display: flex; gap: var(--sp-md); align-items: baseline; margin-bottom: var(--sp-lg); }
    .modal-price-current { font-size: 2rem; font-weight: 700; color: var(--primary); }
    .modal-price-original { font-size: 0.9rem; color: var(--text-light); text-decoration: line-through; }
    .spec-box {
      background: var(--bg-light); padding: var(--sp-md);
      border-radius: 8px; margin-bottom: var(--sp-lg);
    }
    .spec-box p { font-size: 0.9rem; line-height: 1.65; margin: 0; }
    .modal-meta { display: flex; gap: var(--sp-lg); margin-bottom: var(--sp-lg); }
    .modal-meta-item label {
      display: block; font-size: 0.7rem; color: var(--text-light);
      text-transform: uppercase; font-weight: 700; letter-spacing: 1px; margin-bottom: 4px;
    }
    .modal-meta-item span { font-size: 1rem; font-weight: 700; }
    .meta-rating { color: var(--accent); }
    .meta-warranty { color: var(--primary); }
    .modal-cta { display: flex; gap: var(--sp-sm); margin-bottom: var(--sp-sm); }
    .modal-cta button { flex: 1; padding: 0.85rem; border-radius: 5px; font-size: 0.95rem; font-weight: 700; font-family: inherit; cursor: pointer; transition: all 0.2s; }
    .modal-cta .cta-cart { background: var(--primary); color: #fff; border: 2px solid var(--primary); }
    .modal-cta .cta-cart:hover { background: var(--primary-light); }
    .modal-cta .cta-room { background: transparent; color: var(--primary); border: 2px solid var(--primary); }
    .modal-cta .cta-room:hover { background: var(--primary); color: #fff; }
    .modal-consult { width: 100%; padding: 0.85rem; border-radius: 5px; font-size: 0.95rem; font-weight: 700; font-family: inherit; cursor: pointer; background: var(--accent); color: #fff; border: none; transition: background 0.2s; }
    .modal-consult:hover { background: #b8953d; }

    /* ── Room Visualizer ── */
    .room-modal {
      position: fixed; inset: 0; z-index: 1001;
      background: rgba(0,0,0,0.88);
      display: flex; align-items: center; justify-content: center;
    }
    .room-container {
      position: relative; width: 92%; max-width: 920px;
      height: 88vh; background: #fff;
      border-radius: 14px; overflow: hidden;
    }
    .room-close {
      position: absolute; top: 16px; right: 16px; z-index: 1002;
      background: var(--primary); color: #fff;
      border: none; padding: 7px 16px; border-radius: 4px;
      font-size: 0.85rem; font-weight: 700; font-family: inherit; cursor: pointer;
    }

    /* ── Toast notification ── */
    .toast {
      position: fixed; bottom: 2rem; right: 2rem; z-index: 2000;
      background: var(--primary); color: #fff;
      padding: 0.75rem 1.5rem; border-radius: 8px;
      font-weight: 600; font-size: 0.9rem;
      box-shadow: 0 8px 24px rgba(0,0,0,0.2);
      animation: toastIn 0.3s ease, toastOut 0.3s ease 1.7s forwards;
    }
    @keyframes toastIn  { from { opacity:0; transform: translateY(16px); } to { opacity:1; transform: none; } }
    @keyframes toastOut { to   { opacity:0; transform: translateY(16px); } }

    /* ── Footer ── */
    footer {
      background: var(--primary); color: rgba(255,255,255,0.88);
      padding: var(--sp-xl) 0; margin-top: var(--sp-xl);
    }
    .footer-grid {
      display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: var(--sp-xl); margin-bottom: var(--sp-xl);
    }
    .footer-col h4 { color: #fff; font-size: 0.95rem; margin-bottom: var(--sp-md); }
    .footer-col ul { list-style: none; }
    .footer-col ul li { margin-bottom: var(--sp-xs); }
    .footer-col a {
      color: rgba(255,255,255,0.72); text-decoration: none;
      font-size: 0.875rem; transition: color 0.2s;
    }
    .footer-col a:hover { color: var(--accent); }
    .footer-bottom {
      border-top: 1px solid rgba(255,255,255,0.15);
      padding-top: var(--sp-md); text-align: center;
    }
    .footer-bottom p { color: rgba(255,255,255,0.55); font-size: 0.82rem; }

    /* ── Responsive ── */
    @media (max-width: 900px) {
      .nav-links { display: none; }
      .hero { grid-template-columns: 1fr; min-height: auto; }
      .hero-image { height: 280px; font-size: 5rem; }
      .modal-grid { grid-template-columns: 1fr; }
      .modal-viewer { height: 280px; }
    }
    @media (max-width: 600px) {
      .products-grid { grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); }
    }
  </style>
</head>

    /* ─── Three.js helpers ─── */
    function buildGeometry(cat) {
      switch (cat) {
        case 'kitchen':  return new THREE.BoxGeometry(2, 1.5, 0.8);
        case 'wardrobe': return new THREE.BoxGeometry(1.2, 2.5, 0.6);
        case 'living':   return new THREE.BoxGeometry(2.5, 1, 1.2);
        case 'bedroom':  return new THREE.BoxGeometry(2, 1, 2.2);
        case 'dining':   return new THREE.BoxGeometry(2.2, 0.8, 1.2);
        default:         return new THREE.BoxGeometry(1.5, 1.8, 0.5);
      }
    }

    /* ─── 3D Product Viewer ─── */
    const ThreeDViewer = ({ cat }) => {
      const ref = useRef(null);
      useEffect(() => {
        if (!ref.current) return;
        const scene    = new THREE.Scene();
        scene.background = new THREE.Color(0xf8f6f1);
        const camera   = new THREE.PerspectiveCamera(75, ref.current.clientWidth / ref.current.clientHeight, 0.1, 1000);
        camera.position.z = 3;
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(ref.current.clientWidth, ref.current.clientHeight);
        renderer.shadowMap.enabled = true;
        ref.current.appendChild(renderer.domElement);

        scene.add(new THREE.AmbientLight(0xffffff, 0.7));
        const dir = new THREE.DirectionalLight(0xffffff, 0.8);
        dir.position.set(5, 10, 7); dir.castShadow = true; scene.add(dir);

        const mesh = new THREE.Mesh(
          buildGeometry(cat),
          new THREE.MeshStandardMaterial({ color: CAT_COLOR[cat] || 0x2d5a4a, metalness:0.2, roughness:0.7 })
        );
        mesh.castShadow = true; scene.add(mesh);

        const ground = new THREE.Mesh(
          new THREE.PlaneGeometry(10,10),
          new THREE.MeshStandardMaterial({ color:0xf0ede8, roughness:1 })
        );
        ground.rotation.x = -Math.PI/2; ground.position.y = -1.5; ground.receiveShadow = true; scene.add(ground);

        const rot = { x:0, y:0 };
        let drag = false, lastMouse = { x:0, y:0 };
        const onDown  = e => { drag = true;  lastMouse = { x:e.clientX, y:e.clientY }; };
        const onUp    = () => drag = false;
        const onMove  = e => {
          if (!drag) return;
          rot.y += (e.clientX - lastMouse.x) * 0.005;
          rot.x += (e.clientY - lastMouse.y) * 0.005;
          lastMouse = { x:e.clientX, y:e.clientY };
        };
        const onWheel = e => {
          e.preventDefault();
          camera.position.z = Math.max(1.5, Math.min(6, camera.position.z + e.deltaY * 0.001));
        };
        renderer.domElement.addEventListener('mousedown', onDown);
        window.addEventListener('mouseup', onUp);
        window.addEventListener('mousemove', onMove);
        renderer.domElement.addEventListener('wheel', onWheel, { passive:false });

        let raf;
        const animate = () => {
          raf = requestAnimationFrame(animate);
          if (!drag) rot.y += 0.003;
          mesh.rotation.x = rot.x; mesh.rotation.y = rot.y;
          renderer.render(scene, camera);
        };
        animate();

        const onResize = () => {
          if (!ref.current) return;
          camera.aspect = ref.current.clientWidth / ref.current.clientHeight;
          camera.updateProjectionMatrix();
          renderer.setSize(ref.current.clientWidth, ref.current.clientHeight);
        };
        window.addEventListener('resize', onResize);

        return () => {
          cancelAnimationFrame(raf);
          window.removeEventListener('mouseup', onUp);
          window.removeEventListener('mousemove', onMove);
          window.removeEventListener('resize', onResize);
          renderer.dispose();
          if (ref.current && renderer.domElement.parentNode === ref.current)
            ref.current.removeChild(renderer.domElement);
        };
      }, [cat]);

      return <div ref={ref} style={{ width:'100%', height:'100%' }} />;
    };

    /* ─── Room Visualizer ─── */
    const RoomVisualizer = ({ cat, onClose }) => {
      const ref = useRef(null);
      useEffect(() => {
        if (!ref.current) return;
        const scene    = new THREE.Scene();
        scene.background = new THREE.Color(0xfafaf8);
        const camera   = new THREE.PerspectiveCamera(75, ref.current.clientWidth / ref.current.clientHeight, 0.1, 1000);
        camera.position.set(4,3,4); camera.lookAt(0,0,0);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(ref.current.clientWidth, ref.current.clientHeight);
        renderer.shadowMap.enabled = true;
        ref.current.appendChild(renderer.domElement);

        scene.add(new THREE.AmbientLight(0xffffff, 0.6));
        const dir = new THREE.DirectionalLight(0xffffff, 0.9);
        dir.position.set(8,12,8); dir.castShadow = true; scene.add(dir);

        const wallMat  = new THREE.MeshStandardMaterial({ color:0xf5f3f0, roughness:0.8 });
        const backWall = new THREE.Mesh(new THREE.PlaneGeometry(10,8), wallMat);
        backWall.position.z = -5; backWall.receiveShadow = true; scene.add(backWall);
        const leftWall = new THREE.Mesh(new THREE.PlaneGeometry(10,8), wallMat);
        leftWall.rotation.y = Math.PI/2; leftWall.position.x = -5; leftWall.receiveShadow = true; scene.add(leftWall);
        const floor = new THREE.Mesh(
          new THREE.PlaneGeometry(10,10),
          new THREE.MeshStandardMaterial({ color:0xece6dd, roughness:0.9 })
        );
        floor.rotation.x = -Math.PI/2; floor.position.y = -0.1; floor.receiveShadow = true; scene.add(floor);

        let geo, pos;
        if      (cat==='living')   { geo = new THREE.BoxGeometry(3,1,1.5);          pos = [0,0.5,-1]; }
        else if (cat==='dining')   { geo = new THREE.CylinderGeometry(1,1,0.8,32);  pos = [0,0.4,0]; }
        else if (cat==='bedroom')  { geo = new THREE.BoxGeometry(2.5,1,3);          pos = [0,0.5,0]; }
        else if (cat==='wardrobe') { geo = new THREE.BoxGeometry(1.2,2.5,0.6);      pos = [-2,1.25,-3]; }
        else if (cat==='kitchen')  { geo = new THREE.BoxGeometry(4,1.5,0.8);        pos = [0,0.75,-4.5]; }
        else                       { geo = new THREE.BoxGeometry(1.5,1.8,0.5);      pos = [-2,0.9,0]; }

        const furniture = new THREE.Mesh(geo,
          new THREE.MeshStandardMaterial({ color:CAT_COLOR[cat]||0x2d5a4a, metalness:0.15, roughness:0.6 })
        );
        furniture.position.set(...pos); furniture.castShadow = true; furniture.receiveShadow = true;
        scene.add(furniture);

        let raf;
        const animate = () => {
          raf = requestAnimationFrame(animate);
          furniture.rotation.y += 0.005;
          renderer.render(scene, camera);
        };
        animate();

        return () => {
          cancelAnimationFrame(raf);
          renderer.dispose();
          if (ref.current && renderer.domElement.parentNode === ref.current)
            ref.current.removeChild(renderer.domElement);
        };
      }, [cat]);

      return (
        <div className="room-modal">
          <div className="room-container">
            <button className="room-close" onClick={onClose}>✕ Close</button>
            <div ref={ref} style={{ width:'100%', height:'100%' }} />
          </div>
        </div>
      );
    };

    /* ─── Product Detail Modal ─── */
    const ProductModal = ({ product, onClose, showToast }) => {
      const [showRoom, setShowRoom] = useState(false);

      return (
        <>
          <div className="modal-backdrop" onClick={e => e.target === e.currentTarget && onClose()}>
            <div className="modal">
              <button className="modal-close" onClick={onClose} aria-label="Close">✕</button>

              <div className="modal-grid">
                <div className="modal-viewer">
                  <ThreeDViewer cat={product.cat} />
                </div>

                <div>
                  <h2>{product.name}</h2>
                  <div className="modal-price">
                    <span className="modal-price-current">{product.price}</span>
                    {product.original && <span className="modal-price-original">{product.original}</span>}
                  </div>

                  <div className="spec-box">
                    <p>{product.spec}</p>
                  </div>

                  <div className="modal-meta">
                    <div className="modal-meta-item">
                      <label>Rating</label>
                      <span className="meta-rating">{product.rating}</span>
                    </div>
                    <div className="modal-meta-item">
                      <label>Warranty</label>
                      <span className="meta-warranty">✓ {product.warranty}</span>
                    </div>
                  </div>

                  <div className="modal-cta">
                    <button className="cta-cart" onClick={() => { showToast('Added to cart! 🛒'); onClose(); }}>Add to Cart</button>
                    <button className="cta-room" onClick={() => setShowRoom(true)}>View in Room</button>
                  </div>
                  <button className="modal-consult" onClick={() => { showToast('Consultation booked! We\'ll call you shortly.'); onClose(); }}>
                    Book Free Consultation
                  </button>
                </div>
              </div>
            </div>
          </div>

          {showRoom && <RoomVisualizer cat={product.cat} onClose={() => setShowRoom(false)} />}
        </>
      );
    };

    /* ─── Toast ─── */
    const Toast = ({ msg }) => <div className="toast">{msg}</div>;

    /* ─── Main App ─── */
    const App = () => {
      const [filter,     setFilter]     = useState('all');
      const [cartCount,  setCartCount]  = useState(3);
      const [heartAnim,  setHeartAnim]  = useState(false);
      const [selected,   setSelected]   = useState(null);
      const [toast,      setToast]      = useState(null);
      const toastTimer = useRef(null);

      const showToast = msg => {
        clearTimeout(toastTimer.current);
        setToast(msg);
        toastTimer.current = setTimeout(() => setToast(null), 2100);
      };

      const handleAddCart = (e, product) => {
        e.stopPropagation();
        setCartCount(c => c + 1);
        showToast(`"${product.name.slice(0,28)}…" added to cart 🛒`);
      };

      const handleHeart = () => {
        setHeartAnim(true);
        setTimeout(() => setHeartAnim(false), 600);
        showToast('Added to wishlist ❤️');
      };

      const visible = filter === 'all' ? PRODUCTS : PRODUCTS.filter(p => p.cat === filter);

      return (
        <div>
          {/* ── Header ── */}
          <header>
            <div className="container">
              <nav>
                <div className="nav-brand">Magic Woods</div>
                <ul className="nav-links">
                  <li><a href="#">Home</a></li>
                  <li><a href="#">Collections</a></li>
                  <li><a href="#">Design Consultation</a></li>
                  <li><a href="#">About</a></li>
                  <li><a href="#">Contact</a></li>
                </ul>
                <div className="nav-icons">
                  <button className="icon-btn" aria-label="Search">🔍</button>
                  <button className={`icon-btn${heartAnim ? ' heart-active' : ''}`} onClick={handleHeart} aria-label="Wishlist">❤️</button>
                  <button className="icon-btn" aria-label="Cart">
                    🛒
                    {cartCount > 0 && <span className="cart-badge">{cartCount}</span>}
                  </button>
                  <button className="btn btn-primary" style={{padding:'0.5rem 1.25rem', fontSize:'0.875rem'}}>Login</button>
                </div>
              </nav>
            </div>
          </header>

          {/* ── Hero ── */}
          <section style={{borderBottom:'1px solid var(--border)'}}>
            <div className="container">
              <div className="hero">
                <div className="hero-content">
                  <h1>Premium Modular Furniture for Modern Indian Homes</h1>
                  <p style={{marginTop:'var(--sp-md)'}}>
                    Real-time 3D visualization &bull; Transparent pricing &bull; Professional installation &bull; 5–15 year warranty on every product
                  </p>
                  <div className="hero-buttons" style={{marginTop:'var(--sp-lg)'}}>
                    <button className="btn btn-primary" onClick={() => document.getElementById('catalog').scrollIntoView({behavior:'smooth'})}>Explore Catalog</button>
                    <button className="btn btn-outline" onClick={() => showToast('Consultation request received! We\'ll be in touch.')}>Book Free Consultation</button>
                  </div>
                </div>
                <div className="hero-image">📦</div>
              </div>
            </div>
          </section>

          {/* ── Catalog ── */}
          <section className="section" id="catalog">
            <div className="container">
              <div className="section-header">
                <span className="eyebrow">Premium Collection</span>
                <h2>Handpicked Furniture for Every Space</h2>
              </div>

              <div className="filters">
                {CATEGORIES.map(c => (
                  <button
                    key={c.id}
                    className={`filter-btn${filter === c.id ? ' active' : ''}`}
                    onClick={() => setFilter(c.id)}
                  >
                    {c.label}
                  </button>
                ))}
              </div>

              <div className="products-grid">
                {visible.map((p, i) => (
                  <div key={i} className="product-card" onClick={() => setSelected(p)}>
                    <div className="product-image">
                      {CAT_ICON[p.cat]}
                      {p.badge && <span className="product-badge">{p.badge}</span>}
                    </div>
                    <div className="product-name">{p.name}</div>
                    <div className="product-spec">{p.spec}</div>
                    <div className="warranty-badge">✓ {p.warranty}</div>
                    <div className="rating">{p.rating}</div>
                    <div className="product-price">
                      <span className="price-current">{p.price}</span>
                      {p.original && <span className="price-original">{p.original}</span>}
                    </div>
                    <div className="product-actions">
                      <button onClick={e => handleAddCart(e, p)}>Add to Cart</button>
                      <button onClick={e => { e.stopPropagation(); setSelected(p); }}>3D View</button>
                    </div>
                  </div>
                ))}
              </div>
            </div>
          </section>

          {/* ── Footer ── */}
          <footer>
            <div className="container">
              <div className="footer-grid">
                <div className="footer-col">
                  <h4>About Magic Woods</h4>
                  <ul>
                    <li><a href="#">Our Story</a></li>
                    <li><a href="#">Quality Standards</a></li>
                    <li><a href="#">Design Philosophy</a></li>
                    <li><a href="#">Sustainability</a></li>
                  </ul>
                </div>
                <div className="footer-col">
                  <h4>Customer Support</h4>
                  <ul>
                    <li><a href="#">Shipping &amp; Delivery</a></li>
                    <li><a href="#">Installation Guide</a></li>
                    <li><a href="#">Warranty &amp; Returns</a></li>
                    <li><a href="#">FAQs</a></li>
                  </ul>
                </div>
                <div className="footer-col">
                  <h4>Experience Centers</h4>
                  <ul>
                    <li><a href="#">Bangalore</a></li>
                    <li><a href="#">Mumbai</a></li>
                    <li><a href="#">Delhi NCR</a></li>
                    <li><a href="#">Hyderabad</a></li>
                  </ul>
                </div>
                <div className="footer-col">
                  <h4>Contact Us</h4>
                  <ul>
                    <li><a href="tel:18002642493">📞 1800-MAGIC-WD</a></li>
                    <li><a href="mailto:hello@magicwoods.in">📧 hello@magicwoods.in</a></li>
                    <li><a href="#">💬 Live Chat</a></li>
                    <li><a href="#">📍 Show Rooms</a></li>
                  </ul>
                </div>
              </div>
              <div className="footer-bottom">
                <p>&copy; 2026 Magic Woods. All rights reserved. &nbsp;|&nbsp; Privacy &nbsp;|&nbsp; Terms</p>
              </div>
            </div>
          </footer>

          {/* ── Modals & Toast ── */}
          {selected && (
            <ProductModal
              product={selected}
              onClose={() => setSelected(null)}
              showToast={showToast}
            />
          )}
          {toast && <Toast msg={toast} />}
        </div>
      );
    };

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
